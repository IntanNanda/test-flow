name: PR Build Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  sonar-scan:
    name: Sonar Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sonar Scanner
        run: |
          npx sonar-scanner \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        # Using sonar-scanner CLI directly — no PR decoration, no GitHub annotation
        # Mirrors SonarQube Community Edition behavior (no GITHUB_TOKEN passed)

      - name: Check quality gate and filter PR files
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          PR_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(ts|tsx|js|jsx)$' || true)

          if [ -z "$PR_FILES" ]; then
            echo "No JS/TS files changed. Skipping."
            exit 0
          fi

          echo "=== Changed files ==="
          echo "$PR_FILES"
          echo ""

          # Wait for Sonar analysis to finish
          echo "Waiting for Sonar analysis..."
          for i in $(seq 1 12); do
            QG_RESPONSE=$(curl -sf -u "$SONAR_TOKEN:" \
              "$SONAR_HOST_URL/api/qualitygates/project_status?projectKey=$SONAR_PROJECT_KEY")
            STATUS=$(echo "$QG_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['projectStatus']['status'])")
            if [ "$STATUS" = "OK" ] || [ "$STATUS" = "ERROR" ] || [ "$STATUS" = "WARN" ]; then
              break
            fi
            echo "Status: $STATUS — retrying ($i/12)..."
            sleep 10
          done

          # Print quality gate conditions detail
          echo ""
          echo "=== Quality Gate: $STATUS ==="
          echo "$QG_RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          conditions = d['projectStatus'].get('conditions', [])
          for c in conditions:
              icon = '✅' if c['status'] == 'OK' else '❌'
              print(f\"{icon} {c['metricKey']}: {c.get('actualValue','?')} (threshold: {c.get('errorThreshold','?')}) — {c['status']}\")
          "
          echo ""

          # Check issues per changed file (BUG, VULNERABILITY, CODE_SMELL)
          echo "=== Issues by file ==="
          FOUND_ISSUES=0
          while IFS= read -r FILE; do
            RESPONSE=$(curl -sf -u "$SONAR_TOKEN:" \
              "$SONAR_HOST_URL/api/issues/search?componentKeys=$SONAR_PROJECT_KEY&files=$FILE&resolved=false&types=BUG,VULNERABILITY,CODE_SMELL&ps=50&additionalFields=rules")
            TOTAL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['total'])")

            if [ "$TOTAL" -gt 0 ]; then
              echo "❌ $FILE — $TOTAL issue(s):"
              echo "$RESPONSE" | FILE="$FILE" python3 -c "
import sys, json, os

d = json.load(sys.stdin)
filepath = os.environ.get('FILE', '')

# Read source file for code snippets
source_lines = []
try:
    with open(filepath, 'r') as f:
        source_lines = f.readlines()
except Exception:
    pass

for issue in d['issues']:
    line = issue.get('line')
    severity = issue.get('severity', '?')
    rule = issue.get('rule', '?')
    msg = issue.get('message', '?')
    itype = issue.get('type', '?')
    text_range = issue.get('textRange', {})
    start_line = text_range.get('startLine', line)
    end_line = text_range.get('endLine', line)

    print(f'')
    print(f'   [{severity}] {itype} — {rule}')
    print(f'   Message : {msg}')
    print(f'   Location: {filepath}:{line}')

    if source_lines and line:
        snippet_start = max(0, (start_line or line) - 3)
        snippet_end = min(len(source_lines), (end_line or line) + 2)
        print(f'   Code snippet:')
        for i, src_line in enumerate(source_lines[snippet_start:snippet_end], start=snippet_start + 1):
            marker = '>>>' if (start_line and end_line and start_line <= i <= end_line) or i == line else '   '
            print(f'   {marker} {i:4d} | {src_line}', end='' if src_line.endswith('\n') else '\n')
"
              FOUND_ISSUES=1
            else
              echo "✅ $FILE — no issues"
            fi
          done <<< "$PR_FILES"

          # Check security hotspots per changed file (separate API)
          echo ""
          echo "=== Security Hotspots ==="
          while IFS= read -r FILE; do
            HS_RESPONSE=$(curl -sf -u "$SONAR_TOKEN:" \
              "$SONAR_HOST_URL/api/hotspots/search?projectKey=$SONAR_PROJECT_KEY&files=$FILE&status=TO_REVIEW&ps=50")
            HS_TOTAL=$(echo "$HS_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('paging',{}).get('total',0))")

            if [ "$HS_TOTAL" -gt 0 ]; then
              echo "🔴 $FILE — $HS_TOTAL hotspot(s):"
              echo "$HS_RESPONSE" | FILE="$FILE" python3 -c "
import sys, json, os

d = json.load(sys.stdin)
filepath = os.environ.get('FILE', '')

source_lines = []
try:
    with open(filepath, 'r') as f:
        source_lines = f.readlines()
except Exception:
    pass

for h in d.get('hotspots', []):
    line = h.get('line')
    vuln = h.get('vulnerabilityProbability', '?')
    rule = h.get('ruleKey', '?')
    msg = h.get('message', '?')
    text_range = h.get('textRange', {})
    start_line = text_range.get('startLine', line)
    end_line = text_range.get('endLine', line)

    print(f'')
    print(f'   [HOTSPOT/{vuln}] — {rule}')
    print(f'   Message : {msg}')
    print(f'   Location: {filepath}:{line}')

    if source_lines and line:
        snippet_start = max(0, (start_line or line) - 3)
        snippet_end = min(len(source_lines), (end_line or line) + 2)
        print(f'   Code snippet:')
        for i, src_line in enumerate(source_lines[snippet_start:snippet_end], start=snippet_start + 1):
            marker = '>>>' if (start_line and end_line and start_line <= i <= end_line) or i == line else '   '
            print(f'   {marker} {i:4d} | {src_line}', end='' if src_line.endswith('\n') else '\n')
"
              FOUND_ISSUES=1
            else
              echo "✅ $FILE — no hotspots"
            fi
          done <<< "$PR_FILES"

          echo ""
          if [ "$FOUND_ISSUES" -eq 1 ]; then
            echo "❌ Quality gate failed — fix issues above before merging."
            exit 1
          fi

          echo "✅ Quality gate passed. Safe to merge."

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
